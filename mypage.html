<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>マイページ｜買えるコーデ帳</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-header">
  <a class="logo" href="index.html">KAERU CODE NOTE</a>

  <nav>
    <a href="posts.html">投稿を見る</a>
    <a href="upload.html">投稿する</a>
    <a href="mypage.html">マイページ</a>
  </nav>
</header>

<main class="page">

  <div class="page-title">
    <p class="eyebrow">MY PAGE</p>
    <h1>マイページ</h1>
    <p>自分の投稿を管理できます。</p>
  </div>

  <section class="form-box" id="authBox">

    <div class="form-section">
      <h2>ログイン / 会員登録</h2>

      <input
        id="email"
        type="email"
        placeholder="メールアドレス"
      >

      <input
        id="password"
        type="password"
        placeholder="パスワード"
      >

      <button
        type="button"
        class="main-btn full-btn"
        id="loginBtn"
      >
        ログイン
      </button>

      <button
        type="button"
        class="sub-btn full-btn"
        id="registerBtn"
      >
        新規登録
      </button>
    </div>

  </section>

  <section
    class="form-box"
    id="myPageArea"
    style="display:none;"
  >

    <div class="login-user-box">

      <p>
        ログイン中：
        <span id="loginUserEmail"></span>
      </p>

      <div
        style="
          display:flex;
          gap:10px;
          flex-wrap:wrap;
          margin-top:12px;
        "
      >

        <a
          class="main-btn"
          href="profile.html"
        >
          プロフィール編集
        </a>

        <button
          type="button"
          class="sub-btn"
          id="logoutBtn"
        >
          ログアウト
        </button>

      </div>

    </div>

    <div
      id="profileSummary"
      class="profile-summary"
    ></div>

    <div
      class="form-box"
      style="
        margin:20px 0;
        border:1px solid #ffd6d6;
        background:#fff8f8;
      "
    >
      <h3 style="margin-top:0; color:#d33;">
        退会
      </h3>

      <p style="color:#666; line-height:1.7;">
        アカウント / プロフィール / 投稿 / フォロー情報がすべて削除されます。
      </p>

      <input
        id="deletePassword"
        type="password"
        placeholder="退会確認のためパスワードを入力"
      >

      <button
        type="button"
        class="delete-btn"
        id="deleteAccountBtn"
        style="margin-top:12px;"
      >
        退会する
      </button>
    </div>

    <section
      id="outfitList"
      class="post-grid"
    ></section>

  </section>

</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-logo">
      © KAERU CODE NOTE
    </div>

    <div class="footer-links">
      <a href="terms.html">利用規約</a>
      <a href="privacy.html">プライバシーポリシー</a>
    </div>
  </div>
</footer>

<nav class="bottom-nav">
  <a href="index.html">
    <span>⌂</span>
    <small>HOME</small>
  </a>

  <a href="posts.html">
    <span>⌕</span>
    <small>POSTS</small>
  </a>

  <a href="upload.html" class="center-post">
    <span>＋</span>
    <small>POST</small>
  </a>

  <a href="favorites.html">
    <span>♡</span>
    <small>LIKE</small>
  </a>

  <a href="mypage.html">
    <span>☻</span>
    <small>MY</small>
  </a>
</nav>

<script type="module" src="mypage.js"></script>

</body>
</html>
