<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿する｜買えるコーデ帳</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-header">

  <a class="logo" href="index.html">
    KAERU CODE NOTE
  </a>

<nav>
  <a href="posts.html">投稿を見る</a>
  <a href="upload.html">投稿する</a>
  <a href="mypage.html">マイページ</a>
</nav>

</header>

<main class="page">

  <div class="page-title">

    <p class="eyebrow">UPLOAD</p>

    <h1>コーデを投稿する</h1>

    <p>
      ログインして投稿できます。
    </p>

  </div>

  <!-- ログイン -->
  <section class="form-box" id="authBox">

    <div class="form-section">

      <h2>ログイン / 会員登録</h2>

      <input
        id="email"
        type="email"
        placeholder="メールアドレス"
      >

      <input
        id="password"
        type="password"
        placeholder="パスワード"
      >

      <button
        type="button"
        class="main-btn full-btn"
        id="loginBtn"
      >
        ログイン
      </button>

      <button
        type="button"
        class="sub-btn full-btn"
        id="registerBtn"
      >
        新規登録
      </button>

    </div>

  </section>

  <!-- 投稿フォーム -->
  <section class="form-box" id="uploadForm" style="display:none;">

    <div class="login-user-box">

      <p>
        ログイン中：
        <span id="loginUserEmail"></span>
      </p>

      <button
        type="button"
        class="sub-btn"
        id="logoutBtn"
      >
        ログアウト
      </button>

    </div>

    <div class="form-section">

      <h2>基本情報</h2>

      <input
        id="title"
        placeholder="コーデ名"
      >

      <div class="image-upload-list">

        <label>イメージ1</label>
        <input type="file" class="imageInput" accept="image/*">

        <label>イメージ2</label>
        <input type="file" class="imageInput" accept="image/*">

        <label>イメージ3</label>
        <input type="file" class="imageInput" accept="image/*">

      </div>

      <p class="help">
        イメージ1は必須です。
      </p>

      <div id="imagePreviewList"></div>

      <input
        id="height"
        placeholder="身長 例：152cm"
      >

    </div>

    <div class="form-section">

      <h2>タグ</h2>

      <input
        id="tagInput"
        placeholder="例：韓国、低身長"
      >

      <button
        type="button"
        class="dark-btn"
        id="tagAddBtn"
      >
        ＋ タグ追加
      </button>

      <div id="tagList"></div>

    </div>

    <div class="form-section">

      <h2>着用アイテム</h2>

      <input
        id="itemName"
        placeholder="商品名"
      >

      <input
        id="itemCode"
        placeholder="SHEIN商品コード"
      >

      <button
        type="button"
        class="dark-btn"
        id="itemAddBtn"
      >
        ＋ アイテム追加
      </button>

      <div id="itemList"></div>

    </div>

    <button
      type="button"
      class="main-btn full-btn"
      id="outfitAddBtn"
    >
      コーデを登録する
    </button>

  </section>

</main>

<script type="module" src="./upload.js?v=3"></script>

</body>
</html>
